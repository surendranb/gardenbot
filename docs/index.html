<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GardenOS Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
    <style>
        body { background-color: #0f172a; color: #e2e8f0; }
        .card { background-color: #1e293b; border-radius: 0.75rem; padding: 1.5rem; }
    </style>
</head>
<body class="p-6 max-w-7xl mx-auto">

    <!-- Header -->
    <div class="flex justify-between items-center mb-8">
        <div>
            <h1 class="text-3xl font-bold text-green-400">🌿 GardenOS Dashboard</h1>
            <p class="text-slate-400 text-sm mt-1">Chennai Station • Automated Monitoring</p>
        </div>
        <div id="last-updated" class="text-xs text-slate-500 font-mono">Syncing data...</div>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
        <!-- Live Vision -->
        <div class="md:col-span-1">
            <div class="card h-full">
                <h2 class="text-lg font-semibold mb-4">Live Vision</h2>
                <div class="rounded-lg overflow-hidden border border-slate-700">
                    <img id="live-photo" src="./media/latest.jpg?t=${Date.now()}" alt="Garden View" class="w-full object-cover">
                </div>
            </div>
        </div>

        <!-- Stats -->
        <div class="md:col-span-2 grid grid-cols-2 gap-4">
            <div class="card col-span-2 bg-slate-800/50 flex justify-between items-center">
                <div>
                    <div class="text-xs text-slate-400 uppercase">Atmosphere</div>
                    <div class="text-3xl font-bold mt-1">
                        <span id="val-temp" class="text-orange-400">--</span><span class="text-slate-500 text-xl">°C</span>
                        <span class="mx-2 text-slate-700">|</span>
                        <span id="val-hum" class="text-blue-400">--</span><span class="text-slate-500 text-xl">%</span>
                    </div>
                </div>
                <div class="text-right">
                    <div class="text-xs text-slate-400 uppercase">VPD</div>
                    <div id="val-vpd" class="text-2xl font-mono text-purple-400 font-bold">-- kPa</div>
                </div>
            </div>

            <!-- Plants -->
            <div id="p1-card" class="card border-l-4 border-green-500">
                <div class="text-xs text-slate-400">Nickels (p1)</div>
                <div class="flex justify-between items-end mt-1">
                    <span id="p1-val" class="text-2xl font-bold">--</span>
                    <span id="p1-status" class="text-xs px-2 py-1 rounded bg-slate-700">...</span>
                </div>
            </div>
            <div id="p2-card" class="card border-l-4 border-lime-400">
                <div class="text-xs text-slate-400">Mint (p2)</div>
                <div class="flex justify-between items-end mt-1">
                    <span id="p2-val" class="text-2xl font-bold">--</span>
                    <span id="p2-status" class="text-xs px-2 py-1 rounded bg-slate-700">...</span>
                </div>
            </div>
            <div id="p3-card" class="card border-l-4 border-yellow-400">
                <div class="text-xs text-slate-400">Pothos (p3)</div>
                <div class="flex justify-between items-end mt-1">
                    <span id="p3-val" class="text-2xl font-bold">--</span>
                    <span id="p3-status" class="text-xs px-2 py-1 rounded bg-slate-700">...</span>
                </div>
            </div>
            <div class="card bg-slate-800/50">
                <div class="text-xs text-slate-400">Light</div>
                <div id="val-light" class="text-2xl font-bold text-yellow-200 mt-1">-- Lux</div>
            </div>
        </div>

        <!-- Warden Log -->
        <div class="md:col-span-3">
            <div class="card bg-slate-900/80 border border-slate-700">
                <h2 class="text-xs font-semibold mb-2 text-slate-400 uppercase tracking-wider">Latest Observer Insight</h2>
                <div id="warden-log" class="text-sm text-slate-300 font-mono whitespace-pre-wrap h-32 overflow-y-auto pr-2 italic">Waiting for report...</div>
            </div>
        </div>
    </div>

    <!-- Chart -->
    <div class="card h-96">
        <h2 class="text-lg font-semibold mb-4">72-Hour Moisture Trends (%)</h2>
        <div class="relative h-full w-full">
            <canvas id="telemetryChart"></canvas>
        </div>
    </div>

    <script>
        console.log("Dashboard Base URL:", window.location.href);

        function parseCSV(url) {
            return new Promise((resolve, reject) => {
                Papa.parse(url, {
                    download: true,
                    header: true,
                    skipEmptyLines: true,
                    complete: (results) => resolve(results.data),
                    error: (err) => reject(err)
                });
            });
        }

        async function updateDashboard() {
            try {
                // Fetch both CSVs in parallel
                const [telemetry, metrics] = await Promise.all([
                    parseCSV("./data/telemetry.csv"),
                    parseCSV("./data/metrics.csv")
                ]);

                if (!telemetry.length || !metrics.length) throw new Error("Missing data in CSVs");

                const lastTel = telemetry[telemetry.length - 1];
                const lastMet = metrics[metrics.length - 1];

                // 1. Update Header & Atmosphere
                document.getElementById('last-updated').textContent = `SYNC: ${new Date(lastTel.timestamp).toLocaleTimeString()}`;
                document.getElementById('val-temp').textContent = lastTel.temp || '--';
                document.getElementById('val-hum').textContent = lastTel.hum || '--';
                document.getElementById('val-vpd').textContent = `${lastMet.vpd || '--'} kPa`;
                document.getElementById('val-light').textContent = lastTel.light || '--';

                // 2. Update Plants
                const updatePlant = (id) => {
                    const pct = lastMet[`${id}_pct`];
                    const isDry = lastMet[`${id}_is_dry`] === "True";
                    
                    if (pct !== undefined) {
                        document.getElementById(`${id}-val`).textContent = `${pct}%`;
                        const stat = document.getElementById(`${id}-status`);
                        stat.textContent = isDry ? "DRY" : "NOMINAL";
                        stat.className = `text-xs px-2 py-1 rounded ${isDry ? 'bg-red-900 text-red-200' : 'bg-green-900 text-green-200'}`;
                    }
                };
                ['p1', 'p2', 'p3'].forEach(updatePlant);

                // 3. Update Chart using Metrics (Percentages)
                drawChart(metrics.slice(-144));

                // 4. Update Log from Vision Ledger (The actual narrative)
                const ledgerRes = await fetch('../logs/vision_ledger.md');
                if (ledgerRes.ok) {
                    const text = await ledgerRes.text();
                    const entries = text.split(/^## /m);
                    const lastEntry = entries[entries.length - 1];
                    if (lastEntry) {
                        // Clean up the entry and display
                        document.getElementById('warden-log').textContent = "## " + lastEntry.trim();
                    }
                }

            } catch (e) { 
                console.error("Dashboard error:", e);
                document.getElementById('last-updated').textContent = "ERROR LOADING DATA";
            }
        }

        let chart = null;
        function drawChart(data) {
            const ctx = document.getElementById('telemetryChart').getContext('2d');
            if (chart) chart.destroy();
            chart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: data.map(d => d.timestamp ? d.timestamp.split(' ')[1].substring(0,5) : ''),
                    datasets: [
                        { label: 'Nickels', data: data.map(d => d.p1_pct), borderColor: '#00FF41', tension: 0.3, pointRadius: 0 },
                        { label: 'Mint', data: data.map(d => d.p2_pct), borderColor: '#ADFF2F', tension: 0.3, pointRadius: 0 },
                        { label: 'Pothos', data: data.map(d => d.p3_pct), borderColor: '#FFD700', tension: 0.3, pointRadius: 0 }
                    ]
                },
                options: { 
                    responsive: true, maintainAspectRatio: false,
                    scales: { 
                        y: { 
                            min: 0, max: 100,
                            grid: { color: '#334155' },
                            title: { display: true, text: 'Moisture %', color: '#94a3b8' }
                        }, 
                        x: { grid: { display: false }, ticks: { maxTicksLimit: 10 } } 
                    },
                    plugins: { legend: { labels: { color: '#94a3b8' } } }
                }
            });
        }

        updateDashboard();
        setInterval(updateDashboard, 300000); // 5 minute sync
    </script>
</body>
</html>

site_name: GardenOS
site_description: High-Fidelity Botanical Agent
site_url: https://surendranb.github.io/gardenbot/
repo_url: https://github.com/surendranb/gardenbot

theme:
  name: material
  palette:
    scheme: slate
  features:
    - navigation.tabs
    - content.code.copy
    - blog

nav:
  - 🌿 Live Dashboard: index.md
  - 🏗️ Architecture: architecture.md
  - 📖 Daily Gallery: gallery.md
  - 🧠 Dev Blog: blog/index.md

plugins:
  - blog:
      post_dir: blog/posts
      post_date_format: full
      post_url_format: "{date}/{slug}"
  - search

markdown_extensions:
  - attr_list
  - md_in_html
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg